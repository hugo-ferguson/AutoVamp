name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install .

      - name: Build executable
        run: |
          echo "from autovamp.__main__ import main; main()" > entry.py
          pyinstaller --onefile --name autovamp entry.py

      - name: Zip artifact
        run: |
          cd dist
          zip autovamp-${{ github.ref_name }}-${{ matrix.platform }}.zip autovamp*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: autovamp-${{ github.ref_name }}-${{ matrix.platform }}
          path: dist/autovamp-${{ github.ref_name }}-${{ matrix.platform }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
